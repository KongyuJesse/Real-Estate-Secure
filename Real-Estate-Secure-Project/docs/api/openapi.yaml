components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
  schemas:
    ApiOkResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        data:
          nullable: true
        meta:
          type: object
        request_id:
          type: string
    PageMeta:
      type: object
      properties:
        count:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    ReconciliationReport:
      type: object
      properties:
        id:
          type: integer
        run_at:
          type: string
          format: date-time
        status:
          type: string
        mismatched_accounts:
          type: integer
        mismatch_details:
          type: object
        created_at:
          type: string
          format: date-time
    FraudEvent:
      type: object
      properties:
        id:
          type: integer
        event_type:
          type: string
        severity:
          type: string
        reference_type:
          type: string
        reference_id:
          type: integer
        payload:
          type: object
        created_at:
          type: string
          format: date-time
    ReconciliationReportListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ReconciliationReport'
            meta:
              $ref: '#/components/schemas/PageMeta'
    FraudEventListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/FraudEvent'
            meta:
              $ref: '#/components/schemas/PageMeta'
    ReconciliationDashboardSeriesItem:
      type: object
      properties:
        day:
          type: string
          format: date-time
        status:
          type: string
        count:
          type: integer
    ReconciliationDashboardTotal:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
    ReconciliationDashboardResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                window_days:
                  type: integer
                totals:
                  type: array
                  items:
                    $ref: '#/components/schemas/ReconciliationDashboardTotal'
                series:
                  type: array
                  items:
                    $ref: '#/components/schemas/ReconciliationDashboardSeriesItem'
    FraudDashboardSeriesItem:
      type: object
      properties:
        day:
          type: string
          format: date-time
        severity:
          type: string
        count:
          type: integer
    FraudDashboardTotal:
      type: object
      properties:
        severity:
          type: string
        count:
          type: integer
    FraudDashboardResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                window_days:
                  type: integer
                totals:
                  type: array
                  items:
                    $ref: '#/components/schemas/FraudDashboardTotal'
                series:
                  type: array
                  items:
                    $ref: '#/components/schemas/FraudDashboardSeriesItem'
    KycDashboardStatusItem:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
    KycDashboardPriorityItem:
      type: object
      properties:
        priority:
          type: string
        count:
          type: integer
    KycDashboardResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                window_days:
                  type: integer
                pending_documents:
                  type: integer
                review_status:
                  type: array
                  items:
                    $ref: '#/components/schemas/KycDashboardStatusItem'
                review_priority:
                  type: array
                  items:
                    $ref: '#/components/schemas/KycDashboardPriorityItem'
                overdue_reviews:
                  type: integer
    KycReviewTask:
      type: object
      properties:
        id:
          type: integer
        document_id:
          type: integer
        status:
          type: string
        priority:
          type: string
        assigned_to:
          type: integer
        sla_due_at:
          type: string
          format: date-time
        escalation_level:
          type: integer
        escalated_at:
          type: string
          format: date-time
        reason:
          type: string
        flags:
          type: object
        risk_score:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    KycReviewTaskListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiOkResponse'
