      type: object
      required: [reviewer_id]
      properties:
        reviewer_id:
          type: string
    KycReviewResolveRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [verified, rejected]
        reason:
          type: string
    ApiErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object
        request_id:
          type: string
    AuthRegisterRequest:
      type: object
      required: [email, password, phone_number, first_name, last_name, date_of_birth]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        phone_number:
          type: string
        phone_country_code:
          type: string
          example: "+237"
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        two_factor_code:
          type: string
          description: TOTP code when MFA is required.

    MfaRequiredResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        data:
          type: object
          properties:
            mfa_required:
              type: boolean
            mfa_token:
              type: string
            expires_in:
              type: integer
        request_id:
          type: string

    MfaEnableResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        data:
          type: object
          properties:
            secret:
              type: string
            otpauth_url:
              type: string
        request_id:
          type: string

    MfaVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        mfa_token:
          type: string
          format: password
    AuthTokens:
      type: object
      properties:
        token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        phone_number:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        roles:
