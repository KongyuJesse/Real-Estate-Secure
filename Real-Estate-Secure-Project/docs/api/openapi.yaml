openapi: 3.0.3
info:
  title: Real Estate Secure API
  version: 0.1.0
servers:
  - url: /v1
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
  /ready:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is degraded
  /auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /auth/login:
    post:
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkResponse'
        '401':
          description: Invalid credentials or MFA required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/MfaRequiredResponse'
  /auth/refresh:
    post:
      summary: Refresh auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
  /auth/logout:
    post:
      summary: Logout
      responses:
        '200':
          description: Logged out
  /auth/forgot-password:
    post:
      summary: Request password reset
      responses:
        '200':
          description: Reset initiated
  /users/contact-verification/session:
    post:
      summary: Start Sumsub contact verification
      responses:
        '201':
          description: Sumsub contact verification session created
  /users/contact-verification/refresh:
    post:
      summary: Refresh Sumsub contact verification status
      responses:
        '200':
          description: Contact verification status refreshed
  /auth/reset-password:
    post:
      summary: Reset password
      responses:
        '200':
          description: Password reset
  /auth/2fa/enable:
    post:
      summary: Enable two-factor authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA secret issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaEnableResponse'
  /auth/2fa/verify:
    post:
      summary: Verify two-factor token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkResponse'
  /auth/biometric/register:
    post:
      summary: Register biometric credential
      responses:
        '200':
          description: Biometric registered
  /auth/biometric/verify:
    post:
      summary: Verify biometric credential
      responses:
        '200':
          description: Biometric verified

  /users/profile:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
    put:
      summary: Update current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile updated
  /users:
    get:
      summary: List users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users
  /users/tasks:
    get:
      summary: Get actionable tasks for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role-based task feed
  /users/roles:
    get:
      summary: List current user's roles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User roles
    post:
      summary: Add a self-service role for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [buyer, seller]
                make_primary:
                  type: boolean
      responses:
        '201':
          description: Role added
  /users/roles/primary:
    put:
      summary: Set the primary role for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
      responses:
        '200':
          description: Primary role updated
  /users/{id}:
    get:
      summary: Get user by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
  /users/{id}/listings:
    get:
      summary: List a user's listings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listings
  /users/{id}/transactions:
    get:
      summary: List a user's transactions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transactions
  /users/{id}/reviews:
    get:
      summary: List a user's reviews
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reviews
  /users/kyc/upload:
    post:
      summary: Upload KYC documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document_type, document_number, issuing_country, issue_date, first_name, last_name, date_of_birth, front_image_base64, front_image_name]
              properties:
                document_type:
                  type: string
                document_number:
                  type: string
                issuing_country:
                  type: string
                issue_date:
                  type: string
                  format: date
                expiry_date:
                  type: string
                  format: date
                first_name:
                  type: string
                last_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                front_image_base64:
                  type: string
                front_image_name:
                  type: string
                back_image_base64:
                  type: string
                back_image_name:
                  type: string
                portrait_base64:
                  type: string
                portrait_name:
                  type: string
      responses:
        '201':
          description: KYC submitted
  /users/kyc/status:
    get:
      summary: Get KYC status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: KYC status
  /users/preferences:
    put:
      summary: Update user preferences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preferences updated
  /users/account:
    delete:
      summary: Delete user account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deleted

  /properties:
    get:
      summary: List active properties
      parameters:
        - in: query
          name: property_type
          schema:
            type: string
        - in: query
          name: listing_type
          schema:
            type: string
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: min_price
          schema:
            type: number
        - in: query
          name: max_price
          schema:
            type: number
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: Property summaries
    post:
      summary: Create property listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateRequest'
      responses:
        '201':
          description: Property created
  /properties/search:
    get:
      summary: Search properties
      parameters:
        - in: query
          name: q
          schema:
            type: string
      responses:
        '200':
          description: Search results
  /properties/map:
    get:
      summary: List map points for properties
      responses:
        '200':
          description: Map points
  /properties/{id}:
    get:
      summary: Get property details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Property details
    put:
      summary: Update property
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Property updated
    delete:
      summary: Delete property
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Property deleted
  /properties/{id}/status:
    get:
      summary: Refresh and return property admission status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Property admission state
  /properties/{id}/documents:
    post:
      summary: Upload property document and refresh sale admission state
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - document_type
                - document_number
                - document_title
                - issuing_authority
                - issue_date
                - file_base64
                - file_name
              properties:
                document_type:
                  type: string
                  enum:
                    - land_title
                    - survey_plan
                    - tax_clearance
                    - non_encumbrance
                    - sale_agreement
                    - building_permit
                    - certificate_of_habitation
                    - valuation_report
                    - certificate_of_property
                    - urbanism_certificate
                    - accessibility_certificate
                    - municipal_certificate
                    - cadastral_signed_plan
                    - site_visit_report
                    - partition_record
                document_number:
                  type: string
                document_title:
                  type: string
                issuing_authority:
                  type: string
                issue_date:
                  type: string
                  format: date-time
                expiry_date:
                  type: string
                  format: date-time
                file_base64:
                  type: string
                file_name:
                  type: string
                mime_type:
                  type: string
                access_level:
                  type: string
                is_public:
                  type: boolean
                watermark_text:
                  type: string
                original_seen_at:
                  type: string
                  format: date-time
                certified_copy_verified:
                  type: boolean
                seen_at_location:
                  type: string
      responses:
        '201':
          description: Document uploaded

  /transactions:
    get:
      summary: List user transactions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transactions
  /transactions/{id}:
    get:
      summary: Get transaction details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
  /transactions/initiate:
    post:
      summary: Initiate transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionInitiateRequest'
      responses:
        '201':
          description: Transaction initiated
  /transactions/{id}/deposit:
    post:
      summary: Record escrow deposit
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionAmountRequest'
      responses:
        '200':
          description: Deposit recorded
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                idempotency_conflict:
                  value:
                    status: error
                    error:
                      message: Idempotency key already used with different payload.
                      code: IDEMPOTENCY_CONFLICT
                    request_id: req_01HZXPKD7R2Y
  /transactions/{id}/lawyer:
    post:
      summary: Assign lawyer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lawyer assigned
  /transactions/{id}/notary:
    post:
      summary: Assign notary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notary_id]
              properties:
                notary_id:
                  type: string
      responses:
        '200':
          description: Notary assigned
  /transactions/{id}/closing-stage:
    post:
      summary: Record a sale closing stage in the notary-led evidence workflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage:
                  type: string
                  enum:
                    - commercially_closed
                    - notarial_deed_signed
                    - mutation_filed
                    - title_transfer_confirmed
      responses:
        '200':
          description: Closing stage updated
  /transactions/{id}/inspect:
    post:
      summary: Start inspection period
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inspection started
  /transactions/{id}/approve:
    post:
      summary: Approve legal review
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Approved
  /transactions/{id}/release:
    post:
      summary: Release escrow funds
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionIdempotencyRequest'
      responses:
        '200':
          description: Funds released
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                idempotency_conflict:
                  value:
                    status: error
                    error:
                      message: Idempotency key already used with different payload.
                      code: IDEMPOTENCY_CONFLICT
                    request_id: req_01HZXPKD7R2Y
  /transactions/{id}/hold:
    post:
      summary: Place escrow funds on hold
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionAmountRequest'
      responses:
        '200':
          description: Funds held
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                idempotency_conflict:
                  value:
                    status: error
                    error:
                      message: Idempotency key already used with different payload.
                      code: IDEMPOTENCY_CONFLICT
                    request_id: req_01HZXPKD7R2Y
  /transactions/{id}/refund:
    post:
      summary: Refund escrow funds
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionAmountRequest'
      responses:
        '200':
          description: Refund issued
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                idempotency_conflict:
                  value:
                    status: error
                    error:
                      message: Idempotency key already used with different payload.
                      code: IDEMPOTENCY_CONFLICT
                    request_id: req_01HZXPKD7R2Y
  /transactions/{id}/documents:
    post:
      summary: Upload transaction evidence document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document_type, file_base64, file_name]
              properties:
                document_type:
                  type: string
                  enum:
                    - notary_deed
                    - tax_registration_receipt
                    - registration_receipt
                    - title_transfer_receipt
                    - title_mutation_receipt
                    - updated_title_evidence
                    - payment_receipt
                    - power_of_attorney
                    - stamped_filing_receipt
                    - hearing_notice
                    - clerk_issued_document
                    - certified_judgment_copy
                    - certificate_of_non_appeal
                    - ministerial_non_objection
                    - site_visit_report
                    - partition_record
                    - cadastral_signed_plan
                    - commission_minutes
                    - other
                file_base64:
                  type: string
                file_name:
                  type: string
                mime_type:
                  type: string
                notes:
                  type: string
                original_seen_at:
                  type: string
                  format: date-time
                certified_copy_verified:
                  type: boolean
                seen_at_location:
                  type: string
                issuing_office:
                  type: string
      responses:
        '201':
          description: Transaction document uploaded
  /transactions/{id}/offline-steps:
    get:
      summary: List offline physical workflow steps for a transaction
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Offline steps
    post:
      summary: Create an offline physical workflow step
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step_type]
              properties:
                step_type:
                  type: string
                  enum:
                    - notary_office_step
                    - municipal_certificate_step
                    - tax_registration_step
                    - mindcaf_filing_step
                    - court_case_step
                    - justice_execution_step
                    - commission_visit_step
                    - cadastral_validation_step
                physical_status:
                  type: string
                  enum:
                    - awaiting_notary_appointment
                    - awaiting_municipal_certificate
                    - awaiting_registration_receipt
                    - awaiting_mindcaf_filing
                    - awaiting_court_hearing
                    - awaiting_final_judgment
                    - awaiting_non_objection
                    - awaiting_commission_visit
                    - in_review
                    - completed
                    - blocked
                    - cancelled
                expected_office:
                  type: string
                assigned_role:
                  type: string
                filing_date:
                  type: string
                  format: date-time
                scheduled_at:
                  type: string
                  format: date-time
                next_follow_up_date:
                  type: string
                  format: date-time
                original_required:
                  type: boolean
                oversight_required:
                  type: boolean
                notes:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Offline step created
  /transactions/{id}/offline-steps/{stepId}/status:
    post:
      summary: Update status for an offline physical workflow step
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [physical_status]
              properties:
                physical_status:
                  type: string
                  enum:
                    - awaiting_notary_appointment
                    - awaiting_municipal_certificate
                    - awaiting_registration_receipt
                    - awaiting_mindcaf_filing
                    - awaiting_court_hearing
                    - awaiting_final_judgment
                    - awaiting_non_objection
                    - awaiting_commission_visit
                    - in_review
                    - completed
                    - blocked
                    - cancelled
                filing_date:
                  type: string
                  format: date-time
                scheduled_at:
                  type: string
                  format: date-time
                next_follow_up_date:
                  type: string
                  format: date-time
                delay_reason:
                  type: string
                notes:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: Offline step updated
  /transactions/{id}/legal-cases:
    get:
      summary: List assisted legal cases for a transaction
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Legal cases
    post:
      summary: Create an assisted legal case for a transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [case_type]
              properties:
                case_type:
                  type: string
                  enum:
                    - administrative_appeal
                    - administrative_litigation
                    - justice_execution
                    - succession_case
                    - judgment_enforcement
                    - domain_national_allocation
                    - old_title_regularization
                    - foreign_party_authorization
                status:
                  type: string
                  enum:
                    - pending_filing
                    - active
                    - awaiting_decision
                    - resolved
                    - closed
                    - blocked
                freezes_automation:
                  type: boolean
                requires_admin_oversight:
                  type: boolean
                expected_office:
                  type: string
                reference_number:
                  type: string
                court_name:
                  type: string
                filing_date:
                  type: string
                  format: date-time
                next_follow_up_date:
                  type: string
                  format: date-time
                final_decision_date:
                  type: string
                  format: date-time
                delay_reason:
                  type: string
                notes:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Legal case created
  /transactions/{id}/legal-cases/{caseId}/status:
    post:
      summary: Update an assisted legal case status
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum:
                    - pending_filing
                    - active
                    - awaiting_decision
                    - resolved
                    - closed
                    - blocked
                filing_date:
                  type: string
                  format: date-time
                next_follow_up_date:
                  type: string
                  format: date-time
                final_decision_date:
                  type: string
                  format: date-time
                reference_number:
                  type: string
                court_name:
                  type: string
                delay_reason:
                  type: string
                notes:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: Legal case updated
  /transactions/{id}/declarations:
    get:
      summary: List external settlement declarations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Settlement declarations
    post:
      summary: Declare an external or hybrid settlement event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settlement_mode, payment_channel, amount]
              properties:
                settlement_mode:
                  type: string
                  enum: [off_platform, hybrid]
                payment_channel:
                  type: string
                  enum: [mobile_money, bank_transfer, cash, cheque, notary, other]
                amount:
                  type: number
                currency:
                  type: string
                payment_reference:
                  type: string
                provider_name:
                  type: string
                occurred_at:
                  type: string
                  format: date-time
                evidence:
                  type: object
                notes:
                  type: string
      responses:
        '201':
          description: Settlement declaration recorded
  /transactions/{id}/declarations/{declarationId}/confirm:
    post:
      summary: Confirm or reject a declared settlement event
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                decision:
                  type: string
                  enum: [confirmed, rejected]
                note:
                  type: string
      responses:
        '200':
          description: Declaration confirmation recorded
  /transactions/{id}/declarations/{declarationId}/review:
    post:
      summary: Lawyer or admin review for a settlement declaration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [confirmed, rejected, flagged]
                review_notes:
                  type: string
      responses:
        '200':
          description: Declaration reviewed
  /transactions/{id}/dispute:
    post:
      summary: Mark transaction as disputed
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Dispute opened
  /transactions/{id}/cancel:
    post:
      summary: Cancel transaction
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transaction cancelled
